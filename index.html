/* phone shell */
.phone{width:390px;height:844px;border-radius:44px;overflow:hidden;position:relative;border:1px solid rgba(0,0,0,0.15);box-shadow:0 40px 100px rgba(0,0,0,0.5);display:flex;flex-direction:column;transition:background 0.3s;}
.phone.dark{background:#0B0D17;box-shadow:0 0 0 8px rgba(255,255,255,0.015),0 40px 100px rgba(0,0,0,0.8);}
.phone.light{background:#F4F6FB;}

.scr{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;}
.scr::-webkit-scrollbar{display:none;}
.bnav-dark{background:#0F1220;border-top:1px solid rgba(255,255,255,0.04);}
.bnav-light{background:#FFFFFF;border-top:1px solid rgba(0,0,0,0.07);}
.bnav{flex-shrink:0;padding:8px 0 14px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.45}}
@keyframes shimmer{0%{transform:translateX(-200%)}100%{transform:translateX(200%)}}
@keyframes popIn{0%{transform:scale(0.85);opacity:0}80%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes slideLeft{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes aiPulse{0%,100%{box-shadow:0 0 0 0 rgba(212,165,66,0.4)}50%{box-shadow:0 0 0 8px rgba(212,165,66,0)}}

.fu{animation:fadeUp 0.32s ease both;}
.fu2{animation:fadeUp 0.32s 0.05s ease both;}
.fu3{animation:fadeUp 0.32s 0.1s ease both;}
.fu4{animation:fadeUp 0.32s 0.15s ease both;}
.fu5{animation:fadeUp 0.32s 0.2s ease both;}
.btn{cursor:pointer;border:none;outline:none;transition:opacity 0.15s,transform 0.12s;}
.btn:active{opacity:0.78;transform:scale(0.96);}

/* toggle switch */
.tog{width:40px;height:22px;border-radius:11px;position:relative;cursor:pointer;transition:background 0.25s;border:none;outline:none;}
.tog-thumb{position:absolute;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform 0.25s,background 0.25s;}
</style>

/* ── APP ── */
function App(){
  const [dark,setDark]=useState(true);
  const C=makeC(dark);
  const [tab,setTab]=useState('home');
  const [screen,setScreen]=useState('home');
  const [selPath,setSelPath]=useState(null);
  const [selPhase,setSelPhase]=useState(null);
  const [selLevel,setSelLevel]=useState(null);
  const [phaseTab,setPhaseTab]=useState('journey');
  const [xp,setXp]=useState(1240);
  const [streak]=useState(7);
  const [toast,setToast]=useState(null);
  const [ls,setLs]=useState({qIdx:0,sel:null,answered:false,correct:0,wrong:0,showAI:false});
  const [libOpen,setLibOpen]=useState('verbal');
  const [aiChat,setAiChat]=useState(null); // null or {hint,q}

  const goTo=useCallback((s,opts={})=>{
    setScreen(s);
    if(opts.path)setSelPath(opts.path);
    if(opts.phase)setSelPhase(opts.phase);
    if(opts.level)setSelLevel(opts.level);
    if(opts.phaseTab)setPhaseTab(opts.phaseTab);
    setLs({qIdx:0,sel:null,answered:false,correct:0,wrong:0,showAI:false});
    setAiChat(null);
  },[]);

  const goBack=useCallback(()=>{
    if(screen==='lesson')setScreen('level');
    else if(screen==='level')setScreen('phase');
    else if(screen==='phase')setScreen('path');
    else if(screen==='path'){setScreen('home');setTab('home');}
    else if(screen==='aichat'){setScreen('lesson');}
  },[screen]);

  const gainXp=useCallback((amt)=>{
    setToast(`+${amt} XP`);
    setXp(p=>p+amt);
    setTimeout(()=>setToast(null),1800);
  },[]);

  const handleTab=(id)=>{setTab(id);if(!['path','phase','level','lesson','aichat'].includes(id))setScreen(id);};
  const showNav=!['path','phase','level','lesson','aichat'].includes(screen);

  const pc=selPhase?C[selPhase.xpKey]||C.blue:C.blue;
  const pathColor=(p)=>C[{gold:'gold',emerald:'emerald',blue:'blue',purple:'purple',cyan:'cyan',red:'red'}[p.xpKey]]||C.gold;

  // resolve color from xpKey
  const col=(key)=>C[key]||C.blue;

  const navItems=[
    {id:'home',Icon:IcoHome,label:'Beranda'},
    {id:'explore',Icon:IcoCompass,label:'Jelajahi'},
    {id:'library',Icon:IcoLib,label:'Library'},
    {id:'profile',Icon:IcoUser,label:'Profil'},
  ];

  return(
    <div className={`phone ${dark?'dark':'light'}`}>
      {/* Status bar */}
      <div style={{flexShrink:0,padding:'14px 24px 0',display:'flex',justifyContent:'space-between',alignItems:'center',background:'transparent'}}>
        <span style={{fontSize:13,fontWeight:700,color:C.tp,fontFamily:'Syne'}}>9:41</span>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          {/* Theme toggle */}
          <button className="tog btn" onClick={()=>setDark(d=>!d)}
            style={{background:dark?'#2A3050':'#CBD5EA'}}>
            <div className="tog-thumb" style={{transform:dark?'translateX(18px)':'translateX(0)',background:dark?C.gold:'#FFFFFF'}}>
              <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9}}>{dark?'🌙':'☀️'}</div>
            </div>
          </button>
          <IcoSig C={C}/><IcoWifi C={C}/><IcoBat C={C}/>
        </div>
      </div>

      {/* Toast */}
      {toast&&(
        <div style={{position:'absolute',top:54,left:'50%',transform:'translateX(-50%)',background:C.gold,color:'#0B0D17',borderRadius:100,padding:'5px 14px',fontWeight:800,fontSize:12,zIndex:999,whiteSpace:'nowrap',fontFamily:'Syne',animation:'popIn 0.25s ease forwards'}}>
          {toast} ⚡
        </div>
      )}

      <div className="scr" style={{background:C.bg}}>
        {screen==='home'&&<HomeScr C={C} goTo={goTo} xp={xp} streak={streak} paths={PATHS} col={col}/>}
        {screen==='explore'&&<ExploreScr C={C} goTo={goTo} paths={PATHS} col={col}/>}
        {screen==='library'&&<LibraryScr C={C} goTo={goTo} topics={TOPIC_LIB} open={libOpen} setOpen={setLibOpen}/>}
        {screen==='profile'&&<ProfileScr C={C} xp={xp} streak={streak} dark={dark} setDark={setDark}/>}
        {screen==='path'&&<PathScr C={C} path={selPath} goBack={goBack} goTo={goTo} col={col}/>}
        {screen==='phase'&&<PhaseScr C={C} path={selPath} phase={selPhase} goBack={goBack} goTo={goTo} activeTab={phaseTab} setActiveTab={setPhaseTab} col={col}/>}
        {screen==='level'&&<LevelScr C={C} path={selPath} phase={selPhase} level={selLevel} goBack={goBack} goTo={goTo} col={col}/>}
        {screen==='lesson'&&<LessonScr C={C} phase={selPhase} goBack={goBack} questions={QUESTIONS} gainXp={gainXp} state={ls} setState={setLs} setScreen={setScreen} setAiChat={setAiChat} col={col}/>}
        {screen==='aichat'&&<AIChatScr C={C} data={aiChat} goBack={goBack}/>}
        {screen==='cv'&&<CVScr C={C} phase={selPhase} goBack={goBack}/>}
      </div>

      {showNav&&(
        <div className={`bnav ${dark?'bnav-dark':'bnav-light'}`}>
          <div style={{display:'flex',justifyContent:'space-around'}}>
            {navItems.map(({id,Icon,label})=>{
              const active=tab===id;
              return(
                <button key={id} className="btn" onClick={()=>handleTab(id)}
                  style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'4px 14px',background:'none'}}>
                  <Icon active={active} C={C}/>
                  <span style={{fontSize:9,color:active?C.gold:C.ts,fontWeight:active?700:400,transition:'color 0.2s'}}>{label}</span>
                </button>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* ─────────────── HOME ─────────────── */

  const ap=paths.find(p=>p.enrolled);
  const aph=ap?.phases.find(p=>p.status==='active');
  const carouselRef=useRef(null);
  const [carIdx,setCarIdx]=useState(0);

  // Timeline: enrolled path active now + upcoming ones
  const timeline=[

/* ─────────────── PATH MAP ─────────────── */
function PathScr({C,path,goBack,goTo,col}){
  if(!path)return null;
  const pColor={'pcpm-bi':C.gold,'pcam-ojk':C.purple,'pcp-lps':C.blue,'rbb-bumn':C.emerald}[path.id]||C.blue;
  const n=path.phases.length;
  const W=350,rowH=118,startY=40,totalH=startY+n*rowH+90;
  const cols=[84,266];
  const pos=path.phases.map((ph,i)=>({x:cols[i%2],y:startY+i*rowH,ph,i}));
  const done=path.phases.filter(p=>p.status==='completed').length;

  function buildPath(){
    let d=`M ${pos[0].x} ${pos[0].y}`;
    for(let i=1;i<pos.length;i++){
      const a=pos[i-1],b=pos[i];
      const cpx1=a.x+(b.x>a.x?58:-58),cpy1=a.y+rowH*0.44;
      const cpx2=b.x+(b.x>a.x?-58:58),cpy2=b.y-rowH*0.44;
      d+=` C ${cpx1} ${cpy1} ${cpx2} ${cpy2} ${b.x} ${b.y}`;
    }
    return d;
  }

  const handlePhaseClick=(ph)=>{
    if(ph.status==='locked')return;
    if(ph.id==='cv'){goTo('cv',{path,phase:ph});return;}
    goTo('phase',{path,phase:ph,phaseTab:'journey'});
  };

  return(
    <div style={{paddingBottom:20,background:C.bg}}>
      <div style={{background:C.dark?`linear-gradient(180deg,${pColor}10 0%,transparent 100%)`:`linear-gradient(180deg,${pColor}08 0%,transparent 100%)`,padding:'14px 20px 16px'}}>
        <button className="btn" onClick={goBack} style={{background:C.card2,border:`1px solid ${C.cardB}`,borderRadius:10,width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:12}}>
          <IcoBack C={C}/>
        </button>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
          <div>
            <span style={{fontFamily:'Syne',fontSize:11,fontWeight:800,color:pColor}}>{path.code}</span>
            <h1 style={{fontFamily:'Syne',fontSize:17,fontWeight:800,color:C.tp,marginBottom:2}}>{path.org}</h1>
            <div style={{display:'flex',gap:12}}>
              {[{l:'Kompetisi',v:path.comp},{l:'Gaji',v:path.salary+' jt'}].map((m,i)=>(
                <span key={i} style={{fontSize:10,color:C.ts}}>{m.l}: <b style={{color:C.tp}}>{m.v}</b></span>
              ))}
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            <p style={{fontSize:9,color:C.ts}}>Selesai</p>
            <p style={{fontFamily:'Syne',fontSize:18,fontWeight:800,color:pColor}}>{done}/{n}</p>
          </div>
        </div>
      </div>
      <p style={{fontSize:10,color:C.ts,letterSpacing:'0.07em',fontWeight:700,padding:'6px 20px 0',textTransform:'uppercase'}}>Peta Perjalanan ⚔️</p>
      <svg width="100%" viewBox={`0 0 ${W} ${totalH}`} style={{display:'block'}} preserveAspectRatio="xMidYMin meet">
        <defs><filter id="ng2"><feGaussianBlur stdDeviation="4.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
        <path d={buildPath()} fill="none" stroke={C.dark?"rgba(255,255,255,0.045)":"rgba(0,0,0,0.07)"} strokeWidth="6" strokeLinecap="round"/>
        {done>0&&<path d={buildPath()} fill="none" stroke={pColor} strokeWidth="6" strokeLinecap="round" strokeDasharray={`${done*rowH*1.22} 99999`} opacity="0.5"/>}
        {pos.map(({x,y,ph,i})=>{
          const isDone=ph.status==='completed',isActive=ph.status==='active',isLocked=ph.status==='locked';
          const nc=isDone?C.emerald:isActive?C[ph.xpKey]||C.blue:'rgba(150,150,150,0.3)';
          const phColor=C[ph.xpKey]||C.blue;
          const labelRight=x<W/2;
          const LW=W*0.43;
          return(
            <g key={ph.id} opacity={isLocked?0.4:1} style={{cursor:isLocked?'default':'pointer'}}
              onClick={()=>handlePhaseClick(ph)}>
              {isActive&&<circle cx={x} cy={y} r="36" fill={phColor} opacity="0.08"><animate attributeName="r" values="30;38;30" dur="2.5s" repeatCount="indefinite"/></circle>}
              <circle cx={x} cy={y} r="25" fill={isDone?`${C.emerald}1A`:isActive?`${phColor}18`:(C.dark?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.04)')} stroke={nc} strokeWidth={isActive?2:1.5} filter={isActive?'url(#ng2)':'none'}/>
              <text x={x} y={y} textAnchor="middle" dominantBaseline="central" fontSize="15" style={{userSelect:'none'}}>{isDone?'✅':isLocked?'🔒':ph.icon}</text>
              {isActive&&<circle cx={x+19} cy={y-19} r="5" fill={phColor} stroke={C.bg} strokeWidth="2"><animate attributeName="opacity" values="1;0.3;1" dur="1.4s" repeatCount="indefinite"/></circle>}
              <circle cx={x-17} cy={y+17} r="7.5" fill={C.bg} stroke={nc} strokeWidth="1"/>
              <text x={x-17} y={y+17} textAnchor="middle" dominantBaseline="central" fontSize="8" fill={nc} fontWeight="800" fontFamily="Syne">{i+1}</text>
              <foreignObject x={labelRight?x+28:x-28-LW} y={y-28} width={LW} height={66} style={{overflow:'visible'}}>
                <div xmlns="http://www.w3.org/1999/xhtml" style={{
                  background:isActive?`${phColor}0E`:isDone?`${C.emerald}07`:(C.dark?'rgba(255,255,255,0.025)':'rgba(0,0,0,0.03)'),
                  border:`1px solid ${isActive?phColor+'28':isDone?C.emerald+'1A':(C.dark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.07)')}`,
                  borderRadius:10,padding:'7px 9px',
                }}>
                  <div style={{display:'flex',alignItems:'center',gap:3,marginBottom:2,justifyContent:labelRight?'flex-start':'flex-end'}}>
                    <p style={{fontSize:10,fontWeight:700,color:isDone?C.emerald:isActive?phColor:C.tp,margin:0,lineHeight:1.2}}>{ph.name}</p>
                    {ph.boss&&<span style={{fontSize:7,background:C.redBg,color:C.red,borderRadius:3,padding:'1px 3px',fontWeight:800}}>BOSS</span>}
                  </div>
                  <p style={{fontSize:9,color:C.ts,margin:0}}>⚡{ph.xp} · ⏱{ph.est}</p>
                  {isActive&&ph.prog!=null&&<div style={{marginTop:4,background:C.dark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)',borderRadius:100,height:2.5,overflow:'hidden'}}><div style={{height:'100%',width:`${ph.prog*100}%`,background:phColor,borderRadius:100}}/></div>}
                </div>
              </foreignObject>
            </g>
          );
        })}
        <g transform={`translate(${W/2},${startY+n*rowH+26})`}>
          <circle r="24" fill={`${pColor}14`} stroke={pColor} strokeWidth="1.5" opacity="0.75"/>
          <text textAnchor="middle" dominantBaseline="central" fontSize="18">🏆</text>
        </g>
        <text x={W/2} y={startY+n*rowH+62} textAnchor="middle" fontSize="10" fill={pColor} fontWeight="800" fontFamily="Syne">Lulus {path.code}!</text>
      </svg>
    </div>
  );
}

  const levels=TPA_LEVELS;
  const allSteps=levels.flatMap(l=>l.steps);
  const doneSteps=allSteps.filter(s=>s.status==='completed').length;
  const pc=C[phase.xpKey]||C.blue;

  return(
    <div style={{paddingBottom:40,background:C.bg}}>
      <div style={{padding:'14px 20px 14px',background:`linear-gradient(180deg,${pc}10 0%,transparent 100%)`}}>

          <IcoBack C={C}/>

          <span style={{fontSize:20}}>{phase.icon}</span>
          <div style={{flex:1}}>
            <p style={{fontSize:10,color:C.ts}}>{path.code} · Fase {path.phases.indexOf(phase)+1}/{path.phases.length}</p>
            <h1 style={{fontFamily:'Syne',fontSize:15,fontWeight:800,color:C.tp}}>{phase.name}</h1>
          </div>
          <p style={{fontFamily:'Syne',fontSize:16,fontWeight:800,color:pc}}>{Math.round(doneSteps/allSteps.length*100)}%</p>

        <PBar C={C} value={doneSteps/allSteps.length} color={pc}/>
      </div>

        <div style={{display:'flex',background:C.dark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.05)',borderRadius:11,padding:3,marginBottom:14}}>
          {[{id:'journey',label:'⚔️ Level Journey'},{id:'topics',label:'📚 Topics'}].map(t=>(

        {activeTab==='journey'

          :<TopicsTab C={C} topics={TOPIC_LIB} goTo={goTo} path={path} phase={phase}/>

    </div>
  );
}

              <span style={{fontSize:13,color:C.ts,transform:isOpen?'rotate(90deg)':'none',transition:'transform 0.2s'}}>›</span>
            </button>
            {isOpen&&(
              <div style={{background:`${tColor}05`,border:`1px solid ${tColor}18`,borderTop:'none',borderRadius:'0 0 13px 13px',padding:'3px 7px 7px'}}>
                {topic.items.map((item,j)=>{
                  const id=item.status==='completed',ia=item.status==='active',il=item.status==='locked';
                  return(
                    <button key={j} className="btn" disabled={il} onClick={()=>!il&&goTo('lesson',{path,phase})}
                      style={{width:'100%',background:ia?`${tColor}0D`:id?`${C.emerald}07`:'transparent',border:`1px solid ${ia?tColor+'22':id?C.emerald+'15':'transparent'}`,borderRadius:9,padding:'8px 10px',textAlign:'left',marginBottom:4,display:'flex',gap:8,alignItems:'center',opacity:il?0.32:1}}>
                      <span style={{fontSize:12}}>{id?'✅':il?'🔒':'▶'}</span>
                      <div style={{flex:1}}>
                        <div style={{display:'flex',alignItems:'center',gap:3}}>
                          <p style={{fontSize:11,fontWeight:600,color:id?C.emerald:ia?tColor:C.tp,margin:0}}>{item.name}</p>
                          {item.boss&&<span style={{fontSize:7,background:C.redBg,color:C.red,borderRadius:3,padding:'1px 3px',fontWeight:800}}>BOSS</span>}
                        </div>
                        <p style={{fontSize:9,color:C.ts,margin:0}}>{item.sub} · ⏱{item.dur} · ⚡+{item.xp}</p>
                      </div>

                  );
                })}

            )}
          </div>
        );
      })}
    </div>
  );
}

/* ─────────────── LEVEL DETAIL ─────────────── */

/* ─────────────── LESSON (with AI Teacher button) ─────────────── */
function LessonScr({C,phase,goBack,questions,gainXp,state,setState,setScreen,setAiChat,col}){
  const q=questions[Math.min(state.qIdx,questions.length-1)];
  const [timeLeft,setTimeLeft]=useState(45);
  const timerRef=useRef(null);
  const pc=C[phase?.xpKey]||C.blue;

  useEffect(()=>{
    if(!state.answered){
      setTimeLeft(45);
      timerRef.current=setInterval(()=>{
        setTimeLeft(t=>{
          if(t<=1){clearInterval(timerRef.current);setState(s=>({...s,answered:true,sel:-1,wrong:s.wrong+1}));return 0;}
          return t-1;
        });
      },1000);
    }
    return()=>clearInterval(timerRef.current);
  },[state.qIdx,state.answered]);

  const pick=(idx)=>{
    if(state.answered)return;
    clearInterval(timerRef.current);
    const ok=idx===q.correct;
    setState(s=>({...s,sel:idx,answered:true,correct:s.correct+(ok?1:0),wrong:s.wrong+(ok?0:1)}));
    if(ok)gainXp(50);
  };

  const next=()=>{
    if(state.qIdx<questions.length-1)setState(s=>({...s,qIdx:s.qIdx+1,sel:null,answered:false,showAI:false}));
    else{gainXp(100);goBack();}
  };

  const openAI=()=>{
    setAiChat({hint:q.aiHint,q:q.q,type:q.type});
    setScreen('aichat');
  };

  const pct=timeLeft/45;
  const circ=2*Math.PI*11;

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',padding:'14px 20px 16px',background:C.bg}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:12,flexShrink:0}}>
        <button className="btn" onClick={goBack} style={{background:C.card2,border:`1px solid ${C.cardB}`,borderRadius:10,width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <IcoBack C={C}/>
        </button>
        <div style={{flex:1,background:C.dark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.06)',borderRadius:100,height:4,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${state.qIdx/questions.length*100}%`,background:`linear-gradient(90deg,${pc},${C.cyan})`,borderRadius:100,transition:'width 0.5s ease'}}/>
        </div>
        <div style={{display:'flex',gap:6}}>
          <span style={{fontSize:10,color:C.emerald}}>✅{state.correct}</span>
          <span style={{fontSize:10,color:C.red}}>❌{state.wrong}</span>
        </div>
      </div>

      {/* Type + timer */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:11,flexShrink:0}}>
        <span style={{fontSize:10,background:C.blueBg,color:C.blue,borderRadius:6,padding:'3px 8px',fontWeight:700}}>{q.type}</span>
        <div style={{display:'flex',alignItems:'center',gap:5}}>
          <svg width="26" height="26" viewBox="0 0 26 26">
            <circle cx="13" cy="13" r="10" fill="none" stroke={C.dark?"rgba(255,255,255,0.06)":"rgba(0,0,0,0.07)"} strokeWidth="3"/>
            <circle cx="13" cy="13" r="10" fill="none" stroke={timeLeft<=10?C.red:C.gold} strokeWidth="3"
              strokeDasharray={`${circ*pct} ${circ}`} strokeLinecap="round"
              style={{transform:'rotate(-90deg)',transformOrigin:'center',transition:'stroke-dasharray 1s linear'}}/>
          </svg>
          <span style={{fontFamily:'Syne',fontSize:12,fontWeight:800,color:timeLeft<=10?C.red:C.tp,minWidth:20}}>{timeLeft}s</span>
        </div>
      </div>

      {/* Question */}
      <div style={{background:C.card,border:`1px solid ${C.cardB}`,borderRadius:17,padding:15,marginBottom:12,flexShrink:0}}>
        <p style={{fontSize:9.5,color:C.ts,marginBottom:5,fontWeight:700,letterSpacing:'0.04em'}}>SOAL {state.qIdx+1}/{questions.length}</p>
        <p style={{fontSize:15,color:C.tp,lineHeight:1.65,fontWeight:500}}>{q.q}</p>

        {/* AI Teacher button */}
        <button className="btn" onClick={openAI}
          style={{display:'flex',alignItems:'center',gap:6,marginTop:10,background:C.goldBg,border:`1px solid ${C.gold}30`,borderRadius:9,padding:'6px 11px',animation:'aiPulse 2.5s ease-in-out infinite'}}>
          <span style={{fontSize:13}}>🤖</span>
          <span style={{fontSize:10,fontWeight:700,color:C.gold}}>Minta bantuan AI Teacher</span>
          <span style={{fontSize:10,color:C.ts,marginLeft:'auto'}}>→</span>
        </button>
      </div>

      {/* Options */}
      <div style={{flex:1,display:'flex',flexDirection:'column',gap:7,overflow:'auto'}}>
        {q.opts.map((opt,i)=>{
          let bg=C.card,bdr=C.cardB,col=C.tp;
          if(state.answered){
            if(i===q.correct){bg=C.emeraldBg;bdr=C.emerald+'45';col=C.emerald;}
            else if(i===state.sel&&i!==q.correct){bg=C.redBg;bdr=C.red+'45';col=C.red;}
            else bg=C.dark?'rgba(255,255,255,0.02)':'rgba(0,0,0,0.02)';
          }
          return(
            <button key={i} className="btn" onClick={()=>pick(i)}
              style={{background:bg,border:`1px solid ${bdr}`,borderRadius:12,padding:'10px 12px',textAlign:'left',display:'flex',gap:9,alignItems:'center',transition:'all 0.2s'}}>
              <span style={{width:21,height:21,borderRadius:'50%',background:C.dark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.05)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,color:col,flexShrink:0}}>
                {['A','B','C','D'][i]}
              </span>
              <span style={{fontSize:13,color:col,fontWeight:500}}>{opt}</span>
              {state.answered&&i===q.correct&&<span style={{marginLeft:'auto',fontSize:12}}>✓</span>}
            </button>
          );
        })}
      </div>

      {state.answered&&(
        <div style={{marginTop:9,flexShrink:0}}>
          <div style={{background:state.sel===q.correct?C.emeraldBg:C.redBg,border:`1px solid ${state.sel===q.correct?C.emerald+'35':C.red+'35'}`,borderRadius:11,padding:10,marginBottom:8,animation:'fadeUp 0.25s ease'}}>
            <p style={{fontSize:11,fontWeight:800,color:state.sel===q.correct?C.emerald:C.red,marginBottom:2}}>
              {state.sel===q.correct?'✅ Benar! +50 XP':'❌ Belum tepat'}
            </p>
            <p style={{fontSize:10,color:C.ts,lineHeight:1.5}}>{q.aiHint.slice(0,90)}...</p>
          </div>
          <button className="btn" onClick={next}
            style={{width:'100%',background:`linear-gradient(135deg,${pc},${pc}CC)`,border:'none',borderRadius:12,padding:12,fontFamily:'Syne',fontSize:13,fontWeight:800,color:'#fff'}}>
            {state.qIdx<questions.length-1?'Soal Berikutnya →':'Selesai! Klaim Hadiah 🏆'}
          </button>
        </div>
      )}
    </div>
  );
}

/* ─────────────── AI TEACHER CHAT ─────────────── */
function AIChatScr({C,data,goBack}){
  const [input,setInput]=useState('');
  const [msgs,setMsgs]=useState([
    {from:'ai',text:`Hei! Aku KOMPAS AI 🤖 Mari kita bahas soal ini bersama:\n\n"${data?.q}"\n\n${data?.hint}`},
  ]);
  const [typing,setTyping]=useState(false);
  const bottomRef=useRef(null);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'});},[msgs]);

  const send=()=>{
    if(!input.trim())return;
    const userMsg=input.trim();
    setMsgs(m=>[...m,{from:'user',text:userMsg}]);
    setInput('');
    setTyping(true);
    setTimeout(()=>{
      setTyping(false);
      setMsgs(m=>[...m,{from:'ai',text:`Pertanyaan bagus! "${userMsg}" — Coba pikirkan lagi hubungan konseptualnya. Ingat, TPA BI sering menguji kemampuan berpikir analogis dan logis. Apakah ada aspek lain yang ingin kamu gali?`}]);
    },1600);
  };

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:C.bg}}>
      {/* Header */}
      <div style={{flexShrink:0,padding:'14px 20px 12px',background:C.card,borderBottom:`1px solid ${C.cardB}`,display:'flex',alignItems:'center',gap:10}}>
        <button className="btn" onClick={goBack} style={{background:C.card2,border:`1px solid ${C.cardB}`,borderRadius:10,width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <IcoBack C={C}/>
        </button>
        <div style={{width:34,height:34,borderRadius:10,background:C.goldBg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🤖</div>
        <div>
          <p style={{fontSize:13,fontWeight:700,color:C.tp}}>KOMPAS AI Teacher</p>
          <p style={{fontSize:9.5,color:C.emerald}}>● Online</p>
        </div>
      </div>

      {/* Messages */}
      <div style={{flex:1,overflow:'auto',padding:'12px 16px',display:'flex',flexDirection:'column',gap:10}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:'flex',flexDirection:m.from==='ai'?'row':'row-reverse',gap:8,alignItems:'flex-end',animation:'fadeUp 0.25s ease'}}>
            {m.from==='ai'&&<div style={{width:28,height:28,borderRadius:9,background:C.goldBg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0}}>🤖</div>}
            <div style={{maxWidth:'80%',background:m.from==='ai'?C.card:C.blue,border:m.from==='ai'?`1px solid ${C.cardB}`:'none',borderRadius:m.from==='ai'?'14px 14px 14px 4px':'14px 14px 4px 14px',padding:'10px 12px'}}>
              <p style={{fontSize:12,color:m.from==='ai'?C.tp:'#fff',lineHeight:1.55,whiteSpace:'pre-wrap'}}>{m.text}</p>
            </div>
          </div>
        ))}
        {typing&&(
          <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
            <div style={{width:28,height:28,borderRadius:9,background:C.goldBg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>🤖</div>
            <div style={{background:C.card,border:`1px solid ${C.cardB}`,borderRadius:'14px 14px 14px 4px',padding:'10px 14px',display:'flex',gap:4,alignItems:'center'}}>
              {[0,1,2].map(j=><div key={j} style={{width:5,height:5,borderRadius:'50%',background:C.ts,animation:`pulse 1s ${j*0.2}s infinite`}}/>)}
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      {/* Input */}
      <div style={{flexShrink:0,padding:'10px 16px 20px',background:C.card,borderTop:`1px solid ${C.cardB}`,display:'flex',gap:8,alignItems:'flex-end'}}>
        <input value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
          placeholder="Tanya sesuatu tentang soal ini..."
          style={{flex:1,background:C.inputBg,border:`1px solid ${C.inputBdr}`,borderRadius:12,padding:'10px 13px',fontSize:12,color:C.tp,outline:'none',resize:'none',fontFamily:'Plus Jakarta Sans'}}/>
        <button className="btn" onClick={send} disabled={!input.trim()}
          style={{width:38,height:38,borderRadius:11,background:`linear-gradient(135deg,${C.gold},${C.goldT})`,display:'flex',alignItems:'center',justifyContent:'center',opacity:input.trim()?1:0.4}}>
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2 7.5H13M13 7.5L8.5 3M13 7.5L8.5 12" stroke="#0B0D17" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
      </div>
    </div>
  );
}
