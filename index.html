*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#0A0A0A;font-family:'Poppins',sans-serif;overflow:hidden;}
#root{height:100%;display:flex;justify-content:center;align-items:center;gap:28px;background:radial-gradient(ellipse at 30% 40%,#1a0a2e 0%,#0A0A0A 60%);}

/* phone shell */
.phone{width:390px;height:844px;border-radius:48px;overflow:hidden;position:relative;display:flex;flex-direction:column;transition:background 0.3s;box-shadow:0 40px 80px rgba(0,0,0,0.8),inset 0 0 0 1px rgba(255,255,255,0.06);}
.phone.dark{background:#000000;}
.phone.light{background:#F5F5F5;}

.scr{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;}
.scr::-webkit-scrollbar{display:none;}
.bnav-dark{background:rgba(10,10,10,0.95);border-top:1px solid rgba(155,109,255,0.1);backdrop-filter:blur(20px);}
.bnav-light{background:rgba(255,255,255,0.95);border-top:1px solid rgba(74,0,176,0.1);backdrop-filter:blur(20px);}
.bnav{flex-shrink:0;padding:8px 0 18px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.45}}
@keyframes shimmer{0%{transform:translateX(-200%)}100%{transform:translateX(200%)}}
@keyframes popIn{0%{transform:scale(0.85);opacity:0}80%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes aiPulse{0%,100%{box-shadow:0 0 0 0 rgba(155,109,255,0.5)}50%{box-shadow:0 0 0 10px rgba(155,109,255,0)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(155,109,255,0.3)}50%{box-shadow:0 0 40px rgba(155,109,255,0.6)}}
@keyframes drawerUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

.fu{animation:fadeUp 0.35s ease both;}
.fu2{animation:fadeUp 0.35s 0.06s ease both;}
.fu3{animation:fadeUp 0.35s 0.12s ease both;}
.fu4{animation:fadeUp 0.35s 0.18s ease both;}
.fu5{animation:fadeUp 0.35s 0.24s ease both;}
.btn{cursor:pointer;border:none;outline:none;transition:all 0.18s ease;}
.btn:active{opacity:0.75;transform:scale(0.95);}

.tog{width:44px;height:24px;border-radius:12px;position:relative;cursor:pointer;transition:background 0.25s;border:none;outline:none;}
.tog-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform 0.25s;display:flex;align-items:center;justify-content:center;font-size:10px;}
</style>

/* ── APP ── */
// Screen → parent screen mapping for goBack
const SCREEN_PARENT={
  // top-level screens have no parent (handled by tab)
  home:null, explore:null, profile:null,
  // sub-screens
  library:'home',
  cv:'path',
  path:'explore',
  phase:'path',
  level:'phase',
  lesson:'level',
  aichat:'lesson',
  explanation:'lesson',
  leaderboard:'home',
  interview:'home',
};

// Which tab should be active for each screen
const SCREEN_TAB={
  home:'home', explore:'explore', profile:'profile',
  library:'home', leaderboard:'home', interview:'home',
  cv:'explore', path:'explore', phase:'explore', level:'explore', lesson:'explore',
  aichat:'explore', explanation:'explore',
};

function App(){
  const [dark,setDark]=useState(true);
  const C=makeC(dark);
  const [tab,setTab]=useState('home');
  const [screen,setScreen]=useState('home');
  const [selPath,setSelPath]=useState(null);
  const [selPhase,setSelPhase]=useState(null);
  const [selLevel,setSelLevel]=useState(null);
  const [phaseTab,setPhaseTab]=useState('journey');
  const [xp,setXp]=useState(1240);
  const [streak]=useState(7);
  const [toast,setToast]=useState(null);
  const [ls,setLs]=useState({qIdx:0,sel:null,answered:false,correct:0,wrong:0});
  const [libOpen,setLibOpen]=useState('verbal');
  const [aiChat,setAiChat]=useState(null);

  const goTo=useCallback((s,opts={})=>{
    setScreen(s);
    if(opts.path!==undefined)setSelPath(opts.path);
    if(opts.phase!==undefined)setSelPhase(opts.phase);
    if(opts.level!==undefined)setSelLevel(opts.level);
    if(opts.phaseTab!==undefined)setPhaseTab(opts.phaseTab);
    if(opts.aiChat!==undefined)setAiChat(opts.aiChat);
    // sync tab
    const t=SCREEN_TAB[s];
    if(t)setTab(t);
    setLs({qIdx:0,sel:null,answered:false,correct:0,wrong:0});
  },[]);

  const goBack=useCallback(()=>{
    const parent=SCREEN_PARENT[screen];
    if(parent===null||parent===undefined){
      // top-level, do nothing
      return;
    }
    setScreen(parent);
    const t=SCREEN_TAB[parent];
    if(t)setTab(t);
  },[screen]);

  const gainXp=useCallback((amt)=>{
    setToast('+'+amt+' XP');
    setXp(p=>p+amt);
    setTimeout(()=>setToast(null),1800);
  },[]);

  // Screens that suppress the navbar
  const SUB_SCREENS=['path','phase','level','lesson','aichat','explanation','library','leaderboard','interview','cv'];
  const showNav=!SUB_SCREENS.includes(screen);

  const handleTab=(id)=>{
    setTab(id);
    setScreen(id);
  };

  const col=(key)=>C[key]||C.pri;

  const navItems=[
    {id:'home',Icon:IcoHome,label:'Overview'},
    {id:'explore',Icon:IcoCompass,label:'Jelajahi'},
    {id:'profile',Icon:IcoUser,label:'Profil'},
  ];

  // Path color helper — brand-aligned
  const pCols={'pcpm-bi':C.pri,'pcam-ojk':C.acc,'pcp-lps':C.sec,'rbb-bumn':C.dark?'#BF9FFF':'#7040D0'};
  const pBgs={'pcpm-bi':C.priBg,'pcam-ojk':C.accBg,'pcp-lps':C.secBg,'rbb-bumn':C.priLight};

  const ap=PATHS.find(p=>p.enrolled);

  return(
    <div className={'phone '+(dark?'dark':'light')}>
      {/* Status bar */}
      <div style={{flexShrink:0,padding:'16px 24px 0',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:13,fontWeight:700,color:C.tp}}>9:41</span>
        <div style={{display:'flex',gap:7,alignItems:'center'}}>
          <button className="tog btn" onClick={()=>setDark(d=>!d)} style={{background:dark?C.pri+'44':'#E0D4FF'}}>
            <div className="tog-thumb" style={{transform:dark?'translateX(20px)':'translateX(0)',background:dark?'#fff':'#fff'}}>
              {dark?'🌙':'☀️'}
            </div>
          </button>
          <IcoSig C={C}/><IcoWifi C={C}/><IcoBat C={C}/>
        </div>
      </div>

      {/* Toast */}
      {toast&&(
        <div style={{position:'absolute',top:58,left:'50%',transform:'translateX(-50%)',background:`linear-gradient(135deg,${C.pri},${C.dark?'#BF9FFF':'#7040D0'})`,color:'#fff',borderRadius:100,padding:'7px 18px',fontWeight:700,fontSize:12,zIndex:999,whiteSpace:'nowrap',animation:'popIn 0.25s ease forwards',boxShadow:'0 8px 24px rgba(155,109,255,0.5)'}}>
          {toast} ✦
        </div>
      )}

      <div className="scr" style={{background:C.bg}}>
        {screen==='home'&&    <HomeScr     C={C} goTo={goTo} xp={xp} streak={streak} paths={PATHS} ap={ap}/>}
        {screen==='explore'&& <ExploreMapScr C={C} goTo={goTo} paths={PATHS}/>}
        {screen==='library'&& <LibraryScr  C={C} goTo={goTo} goBack={goBack} topics={TOPIC_LIB} open={libOpen} setOpen={setLibOpen}/>}
        {screen==='profile'&& <ProfileScr  C={C} xp={xp} streak={streak} dark={dark} setDark={setDark} goTo={goTo}/>}
        {screen==='leaderboard'&&<LeaderboardScr C={C} goBack={goBack}/>}
        {screen==='interview'&&<InterviewScr C={C} goBack={goBack} goTo={goTo}/>}
        {screen==='cv'&&      <CVScr       C={C} phase={selPhase} goBack={goBack}/>}
        {screen==='path'&&    <PathScr     C={C} path={selPath} goBack={goBack} goTo={goTo}/>}
        {screen==='phase'&&   <PhaseScr    C={C} path={selPath} phase={selPhase} goBack={goBack} goTo={goTo} activeTab={phaseTab} setActiveTab={setPhaseTab}/>}
        {screen==='level'&&   <LevelScr    C={C} path={selPath} phase={selPhase} level={selLevel} goBack={goBack} goTo={goTo}/>}
        {screen==='lesson'&&  <LessonScr   C={C} phase={selPhase} goBack={goBack} questions={QUESTIONS} gainXp={gainXp} state={ls} setState={setLs} goTo={goTo}/>}
        {screen==='aichat'&&  <AIChatScr   C={C} data={aiChat} goBack={goBack} goTo={goTo}/>}
        {screen==='explanation'&&<ExplanationScr C={C} data={aiChat} goBack={goBack}/>}
      </div>

      {showNav&&(
        <div className={'bnav '+(dark?'bnav-dark':'bnav-light')}>
          <div style={{display:'flex',justifyContent:'space-around',padding:'0 8px'}}>
            {navItems.map(({id,Icon,label})=>{
              const active=tab===id;
              return(
                <button key={id} className="btn" onClick={()=>handleTab(id)}
                  style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'6px 20px',background:active?C.priBg:'none',borderRadius:24,transition:'all 0.2s'}}>

                </button>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function ExploreMapScr({C,goTo,paths}){
  const [selIdx,setSelIdx]=useState(0);
  const [drawerOpen,setDrawerOpen]=useState(false);
  const [actionDrawerOpen,setActionDrawerOpen]=useState(false);
  const path=paths[selIdx];
  const pColorMap={'pcpm-bi':C.pri,'pcam-ojk':C.acc,'pcp-lps':C.sec,'rbb-bumn':C.dark?'#BF9FFF':'#7040D0'};
  const pBgMap={'pcpm-bi':C.priBg,'pcam-ojk':C.accBg,'pcp-lps':C.secBg,'rbb-bumn':C.priLight};
  const pColor=pColorMap[path.id]||C.blue;
  const dl=['','Santai','Menengah','Sulit','Keras','Ekstrem'];
  const dc=['',C.sec,C.pri,C.dark?'#BF9FFF':'#7040D0',C.acc,C.pri];

  /* Wiggly map logic (same as PathScr but compact, no goBack) */
  const n=path.phases.length;
  const W=350,rowH=106,startY=36,totalH=startY+n*rowH+76;
  const cols=[84,266];
  const pos=path.phases.map((ph,i)=>({x:cols[i%2],y:startY+i*rowH,ph,i}));
  const done=path.phases.filter(p=>p.status==='completed').length;

  function buildPath(){
    let d=`M ${pos[0].x} ${pos[0].y}`;
    for(let i=1;i<pos.length;i++){
      const a=pos[i-1],b=pos[i];
      const cpx1=a.x+(b.x>a.x?54:-54),cpy1=a.y+rowH*0.44;
      const cpx2=b.x+(b.x>a.x?-54:54),cpy2=b.y-rowH*0.44;
      d+=` C ${cpx1} ${cpy1} ${cpx2} ${cpy2} ${b.x} ${b.y}`;
    }
    return d;
  }

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:C.bg,position:'relative'}}>
      {/* Top header */}
      <div style={{flexShrink:0,padding:'10px 20px 12px',background:C.dark?`linear-gradient(180deg,${pColor}12,transparent)`:`linear-gradient(180deg,${pColor}08,transparent)`}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
          <div>
            <span style={{fontFamily:'Poppins',fontSize:11,fontWeight:800,color:pColor,letterSpacing:'0.05em'}}>{path.code}</span>
            <h1 style={{fontFamily:'Poppins',fontSize:16,fontWeight:800,color:C.tp}}>{path.org}</h1>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span style={{fontSize:9,background:dc[path.diff]+'18',color:dc[path.diff],borderRadius:5,padding:'2px 7px',fontWeight:700}}>{dl[path.diff]}</span>
            {/* Switch recruitment button */}
            <button className="btn" onClick={()=>setDrawerOpen(true)}
              style={{background:C.card,border:`1.5px solid ${C.cardB}`,borderRadius:28,padding:'6px 10px',display:'flex',alignItems:'center',gap:5}}>
              <span style={{fontSize:11,color:C.tp,fontWeight:700}}>Ganti</span>
              <span style={{fontSize:13}}>⌄</span>
            </button>
          </div>
        </div>
        {/* Mini stats row */}
        <div style={{display:'flex',gap:10}}>
          {[{l:'Kompetisi',v:path.comp},{l:'Slot',v:path.slots},{l:'Gaji',v:path.salary+' jt'},{l:'Fase',v:`${done}/${n}`}].map((m,i)=>(
            <div key={i} style={{background:C.dark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.04)',borderRadius:24,padding:'5px 9px',flex:1}}>
              <p style={{fontSize:7.5,color:C.ts,marginBottom:1}}>{m.l}</p>
              <p style={{fontSize:10,fontWeight:700,color:i===3?pColor:C.tp}}>{m.v}</p>
            </div>
          ))}
        </div>
      </div>

      {/* Scrollable map */}
      <div style={{flex:1,overflowY:'auto',scrollbarWidth:'none'}}>
        <svg width="100%" viewBox={`0 0 ${W} ${totalH}`} style={{display:'block'}} preserveAspectRatio="xMidYMin meet">
          <defs><filter id="ng3"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
          <path d={buildPath()} fill="none" stroke={C.dark?"rgba(255,255,255,0.045)":"rgba(0,0,0,0.07)"} strokeWidth="6" strokeLinecap="round"/>
          {done>0&&<path d={buildPath()} fill="none" stroke={pColor} strokeWidth="6" strokeLinecap="round" strokeDasharray={done*rowH*1.22+' 99999'} opacity="0.5"/>}
          {pos.map(({x,y,ph,i})=>{
            const isDone=ph.status==='completed',isActive=ph.status==='active',isLocked=ph.status==='locked';
            const nc=isDone?C.sec:isActive?C.pri:'rgba(150,150,150,0.3)';
            const phColor=C.pri;
            const labelRight=x<W/2;
            const LW=W*0.43;
            return(
              <g key={ph.id} opacity={isLocked?0.4:1} style={{cursor:isLocked?'default':'pointer'}}
                onClick={()=>{if(isLocked)return;if(ph.id==='cv')goTo('cv',{path,phase:ph});else goTo('phase',{path,phase:ph,phaseTab:'journey'});}}>
                {isActive&&<circle cx={x} cy={y} r="34" fill={phColor} opacity="0.08"><animate attributeName="r" values="28;36;28" dur="2.5s" repeatCount="indefinite"/></circle>}
                <circle cx={x} cy={y} r="24" fill={isDone?`${C.sec}1A`:isActive?`${phColor}18`:(C.dark?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.04)')} stroke={nc} strokeWidth={isActive?2:1.5} filter={isActive?'url(#ng3)':'none'}/>
                <text x={x} y={y} textAnchor="middle" dominantBaseline="central" fontSize="14" style={{userSelect:'none'}}>{isDone?'✅':isLocked?'🔒':ph.icon}</text>
                {isActive&&<circle cx={x+18} cy={y-18} r="5" fill={phColor} stroke={C.bg} strokeWidth="2"><animate attributeName="opacity" values="1;0.3;1" dur="1.4s" repeatCount="indefinite"/></circle>}
                <circle cx={x-16} cy={y+16} r="7" fill={C.bg} stroke={nc} strokeWidth="1"/>
                <text x={x-16} y={y+16} textAnchor="middle" dominantBaseline="central" fontSize="7.5" fill={nc} fontWeight="800" fontFamily="Poppins">{i+1}</text>
                <foreignObject x={labelRight?x+27:x-27-LW} y={y-26} width={LW} height={62} style={{overflow:'visible'}}>
                  <div xmlns="http://www.w3.org/1999/xhtml" style={{background:isActive?`${phColor}0E`:isDone?`${C.sec}07`:(C.dark?'rgba(255,255,255,0.025)':'rgba(0,0,0,0.03)'),border:`1.5px solid ${isActive?phColor+'28':isDone?C.sec+'1A':(C.dark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.07)')}`,borderRadius:14,padding:'6px 8px'}}>
                    <div style={{display:'flex',alignItems:'center',gap:3,marginBottom:1,justifyContent:labelRight?'flex-start':'flex-end'}}>
                      <p style={{fontSize:10,fontWeight:700,color:isDone?C.sec:isActive?phColor:C.tp,margin:0,lineHeight:1.2}}>{ph.name}</p>
                      {ph.boss&&<span style={{fontSize:7,background:C.redBg,color:C.red,borderRadius:3,padding:'1px 3px',fontWeight:800}}>BOSS</span>}
                    </div>
                    <p style={{fontSize:8.5,color:C.ts,margin:0}}>⚡{ph.xp} · ⏱{ph.est}</p>
                    {isActive&&ph.prog!=null&&<div style={{marginTop:3,background:C.dark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)',borderRadius:100,height:2.5,overflow:'hidden'}}><div style={{height:'100%',width:(ph.prog*100)+'%',background:phColor,borderRadius:100}}/></div>}
                  </div>
                </foreignObject>
              </g>
            );
          })}
          <g transform={'translate('+W/2+','+(startY+n*rowH+22)+')'}>
            <circle r="22" fill={pColor+'14'} stroke={pColor} strokeWidth="1.5" opacity="0.75"/>
            <text textAnchor="middle" dominantBaseline="central" fontSize="16">🏆</text>
          </g>
          <text x={W/2} y={startY+n*rowH+56} textAnchor="middle" fontSize="9.5" fill={pColor} fontWeight="800" fontFamily="Poppins">{'Lulus '+path.code+'!'}</text>
        </svg>
      </div>

      {/* Bottom Drawer overlay */}
      {drawerOpen&&(
        <div style={{position:'absolute',inset:0,zIndex:50,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}
          onClick={()=>setDrawerOpen(false)}>
          {/* Scrim */}
          <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.5)',animation:'fadeUp 0.2s ease both'}}/>
          {/* Drawer */}
          <div onClick={e=>e.stopPropagation()}
            style={{position:'relative',background:C.card,borderRadius:'22px 22px 0 0',padding:'12px 20px 32px',animation:'drawerUp 0.3s ease both'}}>
            {/* Handle */}
            <div style={{width:36,height:4,borderRadius:100,background:C.divider,margin:'0 auto 16px'}}/>
            <p style={{fontFamily:'Poppins',fontSize:14,fontWeight:800,color:C.tp,marginBottom:14}}>Pilih Rekrutmen</p>
            {paths.map((p,i)=>{
              const pc2=pColorMap[p.id]||C.blue;
              const selected=i===selIdx;
              return(

            {results.map((r,i)=>(
              <div key={i} style={{background:C.card,border:`1.5px solid ${C.cardB}`,borderRadius:24,padding:'10px 12px',marginBottom:7}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:5}}>

  );

/* ─────────────── PATH MAP ─────────────── */
function PathScr({C,path,goBack,goTo}){
  if(!path)return null;
  const pColor={'pcpm-bi':C.gold,'pcam-ojk':C.purple,'pcp-lps':C.blue,'rbb-bumn':C.sec}[path.id]||C.blue;
  const n=path.phases.length;
  const W=350,rowH=118,startY=40,totalH=startY+n*rowH+90;
  const cols=[84,266];
  const pos=path.phases.map((ph,i)=>({x:cols[i%2],y:startY+i*rowH,ph,i}));
  const done=path.phases.filter(p=>p.status==='completed').length;

  function buildPath(){
    let d=`M ${pos[0].x} ${pos[0].y}`;
    for(let i=1;i<pos.length;i++){
      const a=pos[i-1],b=pos[i];
      const cpx1=a.x+(b.x>a.x?58:-58),cpy1=a.y+rowH*0.44;
      const cpx2=b.x+(b.x>a.x?-58:58),cpy2=b.y-rowH*0.44;
      d+=` C ${cpx1} ${cpy1} ${cpx2} ${cpy2} ${b.x} ${b.y}`;
    }
    return d;
  }

  const handlePhaseClick=(ph)=>{
    if(ph.status==='locked')return;
    if(ph.id==='cv'){goTo('cv',{path,phase:ph});return;}
    goTo('phase',{path,phase:ph,phaseTab:'journey'});
  };

  return(
    <div style={{paddingBottom:20,background:C.bg}}>
      <div style={{background:C.dark?`linear-gradient(180deg,${pColor}10 0%,transparent 100%)`:`linear-gradient(180deg,${pColor}08 0%,transparent 100%)`,padding:'14px 20px 16px'}}>
        <button className="btn" onClick={goBack} style={{background:C.card2,border:`1.5px solid ${C.cardB}`,borderRadius:26,width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:12}}>
          <IcoBack C={C}/>
        </button>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
          <div>
            <span style={{fontFamily:'Poppins',fontSize:11,fontWeight:800,color:pColor}}>{path.code}</span>
            <h1 style={{fontFamily:'Poppins',fontSize:17,fontWeight:800,color:C.tp,marginBottom:2}}>{path.org}</h1>
            <div style={{display:'flex',gap:12}}>
              {[{l:'Kompetisi',v:path.comp},{l:'Gaji',v:path.salary+' jt'}].map((m,i)=>(
                <span key={i} style={{fontSize:10,color:C.ts}}>{m.l}: <b style={{color:C.tp}}>{m.v}</b></span>
              ))}
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            <p style={{fontSize:9,color:C.ts}}>Selesai</p>
            <p style={{fontFamily:'Poppins',fontSize:18,fontWeight:800,color:pColor}}>{done}/{n}</p>
          </div>
        </div>
      </div>
      <p style={{fontSize:10,color:C.ts,letterSpacing:'0.07em',fontWeight:700,padding:'6px 20px 0',textTransform:'uppercase'}}>Peta Perjalanan ⚔️</p>
      <svg width="100%" viewBox={`0 0 ${W} ${totalH}`} style={{display:'block'}} preserveAspectRatio="xMidYMin meet">
        <defs><filter id="ng2"><feGaussianBlur stdDeviation="4.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
        <path d={buildPath()} fill="none" stroke={C.dark?"rgba(255,255,255,0.045)":"rgba(0,0,0,0.07)"} strokeWidth="6" strokeLinecap="round"/>
        {done>0&&<path d={buildPath()} fill="none" stroke={pColor} strokeWidth="6" strokeLinecap="round" strokeDasharray={`${done*rowH*1.22} 99999`} opacity="0.5"/>}
        {pos.map(({x,y,ph,i})=>{
          const isDone=ph.status==='completed',isActive=ph.status==='active',isLocked=ph.status==='locked';
          const nc=isDone?C.sec:isActive?C.pri:'rgba(150,150,150,0.3)';
          const phColor=C.pri;
          const labelRight=x<W/2;
          const LW=W*0.43;
          return(
            <g key={ph.id} opacity={isLocked?0.4:1} style={{cursor:isLocked?'default':'pointer'}}
              onClick={()=>handlePhaseClick(ph)}>
              {isActive&&<circle cx={x} cy={y} r="36" fill={phColor} opacity="0.08"><animate attributeName="r" values="30;38;30" dur="2.5s" repeatCount="indefinite"/></circle>}
              <circle cx={x} cy={y} r="25" fill={isDone?`${C.sec}1A`:isActive?`${phColor}18`:(C.dark?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.04)')} stroke={nc} strokeWidth={isActive?2:1.5} filter={isActive?'url(#ng2)':'none'}/>
              <text x={x} y={y} textAnchor="middle" dominantBaseline="central" fontSize="15" style={{userSelect:'none'}}>{isDone?'✅':isLocked?'🔒':ph.icon}</text>
              {isActive&&<circle cx={x+19} cy={y-19} r="5" fill={phColor} stroke={C.bg} strokeWidth="2"><animate attributeName="opacity" values="1;0.3;1" dur="1.4s" repeatCount="indefinite"/></circle>}
              <circle cx={x-17} cy={y+17} r="7.5" fill={C.bg} stroke={nc} strokeWidth="1"/>
              <text x={x-17} y={y+17} textAnchor="middle" dominantBaseline="central" fontSize="8" fill={nc} fontWeight="800" fontFamily="Poppins">{i+1}</text>
              <foreignObject x={labelRight?x+28:x-28-LW} y={y-28} width={LW} height={66} style={{overflow:'visible'}}>
                <div xmlns="http://www.w3.org/1999/xhtml" style={{
                  background:isActive?`${phColor}0E`:isDone?`${C.sec}07`:(C.dark?'rgba(255,255,255,0.025)':'rgba(0,0,0,0.03)'),
                  border:`1.5px solid ${isActive?phColor+'28':isDone?C.sec+'1A':(C.dark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.07)')}`,
                  borderRadius:26,padding:'7px 9px',
                }}>
                  <div style={{display:'flex',alignItems:'center',gap:3,marginBottom:2,justifyContent:labelRight?'flex-start':'flex-end'}}>
                    <p style={{fontSize:10,fontWeight:700,color:isDone?C.sec:isActive?phColor:C.tp,margin:0,lineHeight:1.2}}>{ph.name}</p>
                    {ph.boss&&<span style={{fontSize:7,background:C.redBg,color:C.red,borderRadius:3,padding:'1px 3px',fontWeight:800}}>BOSS</span>}
                  </div>
                  <p style={{fontSize:9,color:C.ts,margin:0}}>⚡{ph.xp} · ⏱{ph.est}</p>
                  {isActive&&ph.prog!=null&&<div style={{marginTop:4,background:C.dark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)',borderRadius:100,height:2.5,overflow:'hidden'}}><div style={{height:'100%',width:`${ph.prog*100}%`,background:phColor,borderRadius:100}}/></div>}
                </div>
              </foreignObject>
            </g>
          );
        })}
        <g transform={`translate(${W/2},${startY+n*rowH+26})`}>
          <circle r="24" fill={`${pColor}14`} stroke={pColor} strokeWidth="1.5" opacity="0.75"/>
          <text textAnchor="middle" dominantBaseline="central" fontSize="18">🏆</text>
        </g>
        <text x={W/2} y={startY+n*rowH+62} textAnchor="middle" fontSize="10" fill={pColor} fontWeight="800" fontFamily="Poppins">Lulus {path.code}!</text>
      </svg>
    </div>
  );
}

  const [analyzing,setAnalyzing]=useState(false);
  const [done,setDone]=useState(false);

/* ─────────────── PHASE (journey + topics tabs) ─────────────── */
function PhaseScr({C,path,phase,goBack,goTo,activeTab,setActiveTab}){
  if(!path||!phase)return null;
  const levels=TPA_LEVELS;
  const allSteps=levels.flatMap(l=>l.steps);
  const doneSteps=allSteps.filter(s=>s.status==='completed').length;
  const pc=C[phase.xpKey]||C.blue;

  return(
    <div style={{paddingBottom:40,background:C.bg}}>
      <div style={{padding:'14px 20px 14px',background:`linear-gradient(180deg,${pc}10 0%,transparent 100%)`}}>
        <button className="btn" onClick={goBack} style={{background:C.card2,border:`1.5px solid ${C.cardB}`,borderRadius:26,width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:12}}>
          <IcoBack C={C}/>
        </button>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
          <span style={{fontSize:20}}>{phase.icon}</span>
          <div style={{flex:1}}>
            <p style={{fontSize:10,color:C.ts}}>{path.code} · Fase {path.phases.indexOf(phase)+1}/{path.phases.length}</p>
            <h1 style={{fontFamily:'Poppins',fontSize:15,fontWeight:800,color:C.tp}}>{phase.name}</h1>
          </div>
          <p style={{fontFamily:'Poppins',fontSize:16,fontWeight:800,color:pc}}>{Math.round(doneSteps/allSteps.length*100)}%</p>
        </div>
        <PBar C={C} value={doneSteps/allSteps.length} color={pc}/>
      </div>

      <div style={{padding:'10px 20px 0'}}>
        <div style={{display:'flex',background:C.dark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.05)',borderRadius:28,padding:3,marginBottom:14}}>
          {[{id:'journey',label:'⚔️ Level Journey'},{id:'topics',label:'📚 Topics'}].map(t=>(
            <button key={t.id} className="btn" onClick={()=>setActiveTab(t.id)}
              style={{flex:1,padding:'8px 4px',borderRadius:14,fontFamily:'Poppins',fontSize:11,fontWeight:700,
                background:activeTab===t.id?pc:'none',color:activeTab===t.id?'#000000':C.ts,border:'none',transition:'all 0.2s'}}>
              {t.label}
            </button>
          ))}
        </div>

        {activeTab==='journey'
          ?<JourneyTab C={C} levels={levels} goTo={goTo} path={path} phase={phase} pc={pc}/>
          :<TopicsTab C={C} topics={TOPIC_LIB} goTo={goTo} path={path} phase={phase}/>
        }
      </div>
    </div>
  );
}

/* ─────────────── LEVEL DETAIL ─────────────── */
function LevelScr({C,path,phase,level,goBack,goTo}){
  if(!level)return null;
  const pc=C.pri;
  const typeMap={theory:{label:'Teori',c:C.blue},practice:{label:'Latihan',c:C.sec},mocktest:{label:'Mock Test',c:C.red},tips:{label:'Tips',c:C.gold}};
  const topicColors={Verbal:C.blue,Numerik:C.sec,Figural:C.purple,TBI:C.cyan,Tips:C.gold,Semua:C.red};
  const doneSteps=level.steps.filter(s=>s.status==='completed').length;

  return(
    <div style={{paddingBottom:40,background:C.bg}}>
      <div style={{padding:'14px 20px 16px',background:`linear-gradient(180deg,${pc}10 0%,transparent 100%)`}}>
        <button className="btn" onClick={goBack} style={{background:C.card2,border:`1.5px solid ${C.cardB}`,borderRadius:26,width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:12}}>
          <IcoBack C={C}/>
        </button>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
          <div style={{width:42,height:42,borderRadius:26,background:`${pc}16`,border:`2px solid ${pc}45`,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <span style={{fontFamily:'Poppins',fontSize:8,fontWeight:800,color:pc,lineHeight:1}}>LV</span>
            <span style={{fontFamily:'Poppins',fontSize:17,fontWeight:800,color:pc,lineHeight:1}}>{level.level}</span>
          </div>
          <div style={{flex:1}}>
            <p style={{fontSize:10,color:C.ts}}>{phase?.name}</p>
            <h1 style={{fontFamily:'Poppins',fontSize:16,fontWeight:800,color:C.tp}}>{level.name}</h1>
          </div>
          <p style={{fontFamily:'Poppins',fontSize:15,fontWeight:800,color:pc}}>⚡{level.xp}</p>
        </div>
        <PBar C={C} value={doneSteps/level.steps.length} color={pc}/>
        <p style={{fontSize:9.5,color:C.ts,marginTop:4}}>{doneSteps}/{level.steps.length} langkah selesai</p>
      </div>

      <div style={{padding:'0 20px'}}>
        <div style={{display:'flex',gap:0}}>
          {/* Spine */}
          <div style={{width:22,display:'flex',flexDirection:'column',alignItems:'center',paddingTop:5,flexShrink:0}}>
            {level.steps.map((s,i)=>{
              const isDone=s.status==='completed',isActive=s.status==='active';
              const tc=topicColors[s.topic]||C.ts;
              const nc=isDone?C.sec:isActive?tc:'rgba(150,150,150,0.25)';
              return(
                <React.Fragment key={i}>
                  <div style={{width:11,height:11,borderRadius:'50%',flexShrink:0,zIndex:2,background:isDone?C.sec:isActive?tc:(C.dark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.08)'),border:`2px solid ${nc}`,boxShadow:isActive?`0 0 8px ${tc}50`:'none'}}>
                    {isActive&&<div style={{width:3,height:3,borderRadius:'50%',background:tc,margin:'2px auto',animation:'pulse 1.5s infinite'}}/>}
                  </div>
                  {i<level.steps.length-1&&<div style={{width:2,flex:1,minHeight:56,background:isDone?`${C.sec}35`:(C.dark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.06)'),borderRadius:2,margin:'2px 0'}}/>}
                </React.Fragment>
              );
            })}
          </div>
          {/* Cards */}
          <div style={{flex:1,paddingLeft:9}}>
            {level.steps.map((step,i)=>{
              const isDone=step.status==='completed',isActive=step.status==='active',isLocked=step.status==='locked';

                <div key={i} style={{marginBottom:7}}>

                    <div style={{width:30,height:30,borderRadius:14,flexShrink:0,background:isDone?C.secBg:isActive?`${tc}16`:(C.dark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.04)'),display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>
                      {isDone?'✅':isLocked?'🔒':step.icon}

                      <div style={{display:'flex',alignItems:'center',gap:3,marginBottom:2}}>
                        <p style={{fontSize:12,fontWeight:600,color:isDone?C.sec:isActive?tc:C.tp,margin:0}}>{step.name}</p>

                      </div>
                      <div style={{display:'flex',gap:4}}>
                        <span style={{fontSize:8,background:`${tc}14`,color:tc,borderRadius:4,padding:'1px 5px',fontWeight:700}}>{step.topic}</span>
                        <span style={{fontSize:8,background:`${c}14`,color:c,borderRadius:4,padding:'1px 5px',fontWeight:700}}>{label}</span>

        <div style={{background:`linear-gradient(135deg,${pc}0E,${pc}07)`,border:`1.5px solid ${pc}1C`,borderRadius:26,padding:13,marginTop:8,display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:22}}>🎁</span>

  );
}

/* ─────────────── LESSON (with explanation box + AI follow-ups) ─────────────── */
function LessonScr({C,phase,goBack,questions,gainXp,state,setState,goTo}){
  const q=questions[Math.min(state.qIdx,questions.length-1)];
  const [timeLeft,setTimeLeft]=useState(45);
  const [followCount,setFollowCount]=useState(0);
  const [noteText,setNoteText]=useState('');
  const timerRef=useRef(null);
  const pc=C.pri;
  const MAX_FOLLOW=5;

  useEffect(()=>{
    setFollowCount(0);
    setNoteText('');
    if(!state.answered){
      setTimeLeft(45);
      timerRef.current=setInterval(()=>{
        setTimeLeft(t=>{
          if(t<=1){clearInterval(timerRef.current);setState(s=>({...s,answered:true,sel:-1,wrong:s.wrong+1}));return 0;}
          return t-1;
        });
      },1000);
    }
    return()=>clearInterval(timerRef.current);
  },[state.qIdx,state.answered]);

  const pick=(idx)=>{
    if(state.answered)return;
    clearInterval(timerRef.current);
    const ok=idx===q.correct;
    setState(s=>({...s,sel:idx,answered:true,correct:s.correct+(ok?1:0),wrong:s.wrong+(ok?0:1)}));
    if(ok)gainXp(50);
  };

  const next=()=>{
    if(state.qIdx<questions.length-1)setState(s=>({...s,qIdx:s.qIdx+1,sel:null,answered:false}));
    else{gainXp(100);goBack();}
  };

  const openAI=()=>{
    const chatData={hint:q.aiHint,q:q.q,type:q.type,followCount:followCount+1,maxFollow:MAX_FOLLOW};
    if(followCount>=MAX_FOLLOW){
      goTo('explanation',{aiChat:{hint:q.aiHint,q:q.q,type:q.type}});
      return;
    }
    setFollowCount(c=>c+1);
    goTo('aichat',{aiChat:chatData});
  };

  const pct=timeLeft/45;
  const circ=2*Math.PI*11;

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',padding:'14px 20px 16px',background:C.bg}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:12,flexShrink:0}}>
        <button className="btn" onClick={goBack} style={{background:C.card2,border:`1.5px solid ${C.cardB}`,borderRadius:26,width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <IcoBack C={C}/>
        </button>
        <div style={{flex:1,background:C.dark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.06)',borderRadius:100,height:4,overflow:'hidden'}}>
          <div style={{height:'100%',width:(state.qIdx/questions.length*100)+'%',background:`linear-gradient(90deg,${pc},${C.sec})`,borderRadius:100,transition:'width 0.5s ease'}}/>
        </div>
        <div style={{display:'flex',gap:6}}>
          <span style={{fontSize:10,color:C.sec}}>✅{state.correct}</span>
          <span style={{fontSize:10,color:C.red}}>❌{state.wrong}</span>
        </div>
      </div>

      {/* Type + timer */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,flexShrink:0}}>
        <span style={{fontSize:10,background:C.priBg,color:C.pri,borderRadius:26,padding:'3px 8px',fontWeight:700}}>{q.type}</span>
        <div style={{display:'flex',alignItems:'center',gap:5}}>
          <svg width="26" height="26" viewBox="0 0 26 26">
            <circle cx="13" cy="13" r="10" fill="none" stroke={C.dark?"rgba(255,255,255,0.06)":"rgba(0,0,0,0.07)"} strokeWidth="3"/>
            <circle cx="13" cy="13" r="10" fill="none" stroke={timeLeft<=10?C.acc:C.pri} strokeWidth="3"
              strokeDasharray={`${circ*pct} ${circ}`} strokeLinecap="round"
              style={{transform:'rotate(-90deg)',transformOrigin:'center',transition:'stroke-dasharray 1s linear'}}/>
          </svg>
          <span style={{fontFamily:'Poppins',fontSize:12,fontWeight:800,color:timeLeft<=10?C.red:C.tp,minWidth:20}}>{timeLeft}s</span>
        </div>
      </div>

      {/* Question */}
      <div style={{background:C.card,border:`1.5px solid ${C.cardB}`,borderRadius:28,padding:14,marginBottom:11,flexShrink:0}}>
        <p style={{fontSize:9,color:C.ts,marginBottom:5,fontWeight:700,letterSpacing:'0.04em'}}>SOAL {state.qIdx+1}/{questions.length}</p>
        <p style={{fontSize:14,color:C.tp,lineHeight:1.65,fontWeight:500}}>{q.q}</p>
        {/* AI Teacher button */}
        <button className="btn" onClick={openAI}
          style={{display:'flex',alignItems:'center',gap:6,marginTop:10,background:C.priBg,border:`1.5px solid ${C.pri}30`,borderRadius:14,padding:'6px 11px',width:'100%',animation:'aiPulse 2.5s ease-in-out infinite'}}>
          <span style={{fontSize:13}}>🤖</span>
          <span style={{fontSize:10,fontWeight:700,color:C.pri,flex:1,textAlign:'left'}}>
            {followCount>=MAX_FOLLOW?'Lihat penjelasan lengkap →':'Minta bantuan AI Teacher'}
          </span>
          {followCount>0&&followCount<MAX_FOLLOW&&(
            <span style={{fontSize:9,background:C.pri+'30',color:C.pri,borderRadius:100,padding:'2px 7px',fontWeight:800}}>{followCount}/{MAX_FOLLOW}</span>
          )}
        </button>
      </div>

      {/* Options */}
      <div style={{flex:1,display:'flex',flexDirection:'column',gap:7,overflow:'auto'}}>
        {q.opts.map((opt,i)=>{
          let bg=C.card,bdr=C.cardB,textCol=C.tp;
          if(state.answered){
            if(i===q.correct){bg=C.secBg;bdr=C.sec+'45';textCol=C.sec;}
            else if(i===state.sel&&i!==q.correct){bg=C.redBg;bdr=C.red+'45';textCol=C.red;}
            else bg=C.dark?'rgba(255,255,255,0.02)':'rgba(0,0,0,0.02)';
          }
          return(
            <button key={i} className="btn" onClick={()=>pick(i)}
              style={{background:bg,border:`1.5px solid ${bdr}`,borderRadius:24,padding:'10px 12px',textAlign:'left',display:'flex',gap:9,alignItems:'center',transition:'all 0.2s'}}>
              <span style={{width:21,height:21,borderRadius:'50%',background:C.dark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.05)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,color:textCol,flexShrink:0}}>
                {['A','B','C','D'][i]}
              </span>
              <span style={{fontSize:13,color:textCol,fontWeight:500}}>{opt}</span>
              {state.answered&&i===q.correct&&<span style={{marginLeft:'auto',fontSize:12}}>✓</span>}
            </button>
          );
        })}
      </div>

      {/* Explanation panel after answer */}
      {state.answered&&(
        <div style={{marginTop:9,flexShrink:0,animation:'fadeUp 0.28s ease both'}}>
          {/* Result banner */}
          <div style={{background:state.sel===q.correct?C.secBg:C.redBg,border:`1.5px solid ${state.sel===q.correct?C.sec+'35':C.red+'35'}`,borderRadius:28,padding:'9px 12px',marginBottom:8,display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:16}}>{state.sel===q.correct?'✅':'❌'}</span>
            <p style={{fontSize:12,fontWeight:800,color:state.sel===q.correct?C.sec:C.red}}>
              {state.sel===q.correct?'Benar! +50 XP':'Belum tepat'}
            </p>
          </div>

          {/* Yellow explanation box */}
          <div style={{background:C.dark?'rgba(212,165,66,0.1)':'rgba(251,235,179,0.7)',border:`1.5px solid ${C.pri}35`,borderRadius:28,padding:'10px 12px',marginBottom:7}}>
            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:5}}>
              <span style={{fontSize:13}}>💡</span>
              <p style={{fontSize:10,fontWeight:800,color:C.pri}}>Penjelasan</p>
            </div>
            <p style={{fontSize:11,color:C.dark?C.tp:'#5C4200',lineHeight:1.6}}>{q.aiHint}</p>
          </div>

          {/* Notes text box */}
          <div style={{background:C.card,border:`1.5px solid ${C.cardB}`,borderRadius:28,padding:'8px 11px',marginBottom:8}}>
            <p style={{fontSize:9,color:C.ts,marginBottom:5,fontWeight:700,letterSpacing:'0.04em'}}>📝 CATATAN PRIBADI</p>
            <textarea
              value={noteText} onChange={e=>setNoteText(e.target.value)}
              placeholder="Tulis catatan untuk ingatanmu..."
              style={{width:'100%',background:'none',border:'none',outline:'none',resize:'none',fontSize:11,color:C.tp,fontFamily:'Poppins',lineHeight:1.5,height:48}}
            />
          </div>

          <button className="btn" onClick={next}
            style={{width:'100%',background:`linear-gradient(135deg,${pc},${pc}CC)`,border:'none',borderRadius:24,padding:12,fontFamily:'Poppins',fontSize:13,fontWeight:800,color:'#fff'}}>
            {state.qIdx<questions.length-1?'Soal Berikutnya →':'Selesai! Klaim Hadiah 🏆'}
          </button>
        </div>
      )}
    </div>
  );
}

/* ─────────────── AI TEACHER CHAT ─────────────── */
function AIChatScr({C,data,goBack,goTo}){
  const [input,setInput]=useState('');
  const [msgs,setMsgs]=useState([
    {from:'ai',text:'Hei! Aku KOMPAS AI 🤖 Mari kita bahas soal ini:\n\n"'+(data?.q||'')+'"\n\n'+(data?.hint||'')},
  ]);
  const [typing,setTyping]=useState(false);
  const bottomRef=useRef(null);
  const followCount=data?.followCount||0;
  const maxFollow=data?.maxFollow||5;
  const remaining=maxFollow-followCount;

  const goExplanation=()=>goTo('explanation',{aiChat:{hint:data?.hint,q:data?.q,type:data?.type}});

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'});},[msgs]);

  const send=()=>{
    if(!input.trim())return;
    const userMsg=input.trim();
    setMsgs(m=>[...m,{from:'user',text:userMsg}]);
    setInput('');
    setTyping(true);
    setTimeout(()=>{
      setTyping(false);
      setMsgs(m=>[...m,{from:'ai',text:'Pertanyaan bagus! "'+userMsg+'" — Coba pikirkan lagi hubungan konseptualnya. Apakah ada aspek lain yang ingin kamu gali?'}]);
    },1600);
  };

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:C.bg}}>
      {/* Header */}
      <div style={{flexShrink:0,padding:'14px 20px 10px',background:C.card,borderBottom:`1px solid ${C.cardB}`,display:'flex',alignItems:'center',gap:10}}>
        <button className="btn" onClick={goBack} style={{background:C.card2,border:`1.5px solid ${C.cardB}`,borderRadius:26,width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <IcoBack C={C}/>
        </button>
        <div style={{width:32,height:32,borderRadius:26,background:C.priBg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🤖</div>
        <div style={{flex:1}}>
          <p style={{fontSize:13,fontWeight:700,color:C.tp}}>KOMPAS AI Teacher</p>
          <p style={{fontSize:9,color:C.sec}}>● Online</p>
        </div>
        {/* Follow-up counter */}
        {remaining>0&&(
          <div style={{background:C.priBg,border:`1.5px solid ${C.pri}30`,borderRadius:24,padding:'4px 9px',textAlign:'center'}}>
            <p style={{fontSize:8,color:C.ts}}>Sisa</p>
            <p style={{fontFamily:'Poppins',fontSize:13,fontWeight:800,color:C.pri}}>{remaining}</p>
          </div>
        )}
      </div>

      {/* Follow-up limit bar */}
      {followCount>0&&(
        <div style={{padding:'6px 20px',background:C.card,borderBottom:`1px solid ${C.cardB}`,display:'flex',alignItems:'center',gap:8}}>
          <div style={{flex:1,background:C.divider,borderRadius:100,height:3,overflow:'hidden'}}>
            <div style={{height:'100%',width:(followCount/maxFollow*100)+'%',background:C.pri,borderRadius:100,transition:'width 0.3s'}}/>
          </div>
          <span style={{fontSize:9,color:C.ts,whiteSpace:'nowrap'}}>
            {remaining>0?remaining+' pertanyaan lagi':'Lihat penjelasan lengkap ↓'}
          </span>
        </div>
      )}

      {/* Messages */}
      <div style={{flex:1,overflow:'auto',padding:'12px 16px',display:'flex',flexDirection:'column',gap:10}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:'flex',flexDirection:m.from==='ai'?'row':'row-reverse',gap:8,alignItems:'flex-end',animation:'fadeUp 0.25s ease'}}>
            {m.from==='ai'&&<div style={{width:26,height:26,borderRadius:24,background:C.priBg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,flexShrink:0}}>🤖</div>}
            <div style={{maxWidth:'80%',background:m.from==='ai'?C.card:C.pri,border:m.from==='ai'?`1px solid ${C.cardB}`:'none',borderRadius:m.from==='ai'?'13px 13px 13px 3px':'13px 13px 3px 13px',padding:'9px 11px'}}>
              <p style={{fontSize:12,color:m.from==='ai'?C.tp:'#fff',lineHeight:1.55,whiteSpace:'pre-wrap'}}>{m.text}</p>
            </div>
          </div>
        ))}
        {typing&&(
          <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
            <div style={{width:26,height:26,borderRadius:24,background:C.priBg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13}}>🤖</div>
            <div style={{background:C.card,border:`1.5px solid ${C.cardB}`,borderRadius:'13px 13px 13px 3px',padding:'9px 13px',display:'flex',gap:4,alignItems:'center'}}>
              {[0,1,2].map(j=><div key={j} style={{width:5,height:5,borderRadius:'50%',background:C.ts,animation:'pulse 1s '+j*0.2+'s infinite'}}/>)}
            </div>
          </div>
        )}
        {/* Explanation CTA when limit hit */}
        {remaining===0&&(
          <div style={{background:C.priBg,border:`1.5px solid ${C.pri}30`,borderRadius:26,padding:13,textAlign:'center',animation:'fadeUp 0.3s ease both'}}>
            <p style={{fontSize:13,marginBottom:6}}>📖</p>
            <p style={{fontSize:12,fontWeight:700,color:C.pri,marginBottom:4}}>Sudah 5 follow-up!</p>
            <p style={{fontSize:11,color:C.ts,marginBottom:10}}>Baca penjelasan lengkap untuk pemahaman mendalam.</p>
            <button className="btn" onClick={goExplanation}
              style={{background:`linear-gradient(135deg,${C.pri},${C.dark?'#BF9FFF':'#7040D0'})`,border:'none',borderRadius:26,padding:'9px 18px',fontFamily:'Poppins',fontSize:12,fontWeight:800,color:'#000000'}}>
              Penjelasan Lengkap →
            </button>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      {/* Input */}
      {remaining>0&&(
        <div style={{flexShrink:0,padding:'10px 16px 20px',background:C.card,borderTop:`1px solid ${C.cardB}`,display:'flex',gap:8,alignItems:'flex-end'}}>
          <input value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
            placeholder="Tanya sesuatu..."
            style={{flex:1,background:C.inputBg,border:`1.5px solid ${C.inputBdr}`,borderRadius:28,padding:'9px 12px',fontSize:12,color:C.tp,outline:'none',fontFamily:'Poppins'}}/>
          <button className="btn" onClick={send} disabled={!input.trim()}
            style={{width:36,height:36,borderRadius:26,background:`linear-gradient(135deg,${C.pri},${C.dark?'#BF9FFF':'#7040D0'})`,display:'flex',alignItems:'center',justifyContent:'center',opacity:input.trim()?1:0.4}}>
            <svg width="14" height="14" viewBox="0 0 15 15" fill="none"><path d="M2 7.5H13M13 7.5L8.5 3M13 7.5L8.5 12" stroke="#000000" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </button>
        </div>
      )}
    </div>
  );
}
