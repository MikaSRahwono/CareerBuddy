<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KOMPAS — Career Intelligence Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#06080F;font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden;}
#root{height:100%;display:flex;justify-content:center;align-items:center;background:radial-gradient(ellipse at 20% 50%, #0D1A3A 0%, #06080F 60%);}
.phone{width:390px;height:844px;background:#0B0D17;border-radius:44px;overflow:hidden;position:relative;border:1px solid rgba(255,255,255,0.07);box-shadow:0 0 0 8px rgba(255,255,255,0.015),0 40px 100px rgba(0,0,0,0.8);display:flex;flex-direction:column;}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;}
.screen::-webkit-scrollbar{display:none;}
.bottom-nav{flex-shrink:0;background:#0F1220;border-top:1px solid rgba(255,255,255,0.04);padding:8px 0 14px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
@keyframes glowGold{0%,100%{box-shadow:0 0 18px rgba(212,165,66,0.25)}50%{box-shadow:0 0 36px rgba(212,165,66,0.5)}}
@keyframes shimmer{0%{transform:translateX(-200%)}100%{transform:translateX(200%)}}
@keyframes popIn{0%{transform:scale(0.8);opacity:0}80%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes floatUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-40px);opacity:0}}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
.fade-up{animation:fadeUp 0.4s ease forwards;}
.fade-up-2{animation:fadeUp 0.4s 0.08s ease both;}
.fade-up-3{animation:fadeUp 0.4s 0.16s ease both;}
.fade-up-4{animation:fadeUp 0.4s 0.24s ease both;}
.fade-up-5{animation:fadeUp 0.4s 0.32s ease both;}
.slide-in{animation:slideIn 0.35s ease forwards;}
.btn{cursor:pointer;border:none;outline:none;transition:opacity 0.15s,transform 0.15s;}
.btn:active{opacity:0.82;transform:scale(0.97);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

  emerald:'#10B981',emeraldBg:'rgba(16,185,129,0.11)',

  purple:'#9B6FFF',purpleBg:'rgba(155,111,255,0.11)',
  cyan:'#22D3EE',cyanBg:'rgba(34,211,238,0.11)',
  red:'#F87171',redBg:'rgba(248,113,113,0.11)',
  amber:'#FB923C',

const PATHS=[
  {id:'pcpm-bi',code:'PCPM',org:'Bank Indonesia',shortOrg:'BI',

     {id:'present',name:'Presentasi Final',sub:'Case study & policy recommendation',icon:'🎯',color:C.red,lessons:5,xp:800,status:'locked',est:'5 jam',boss:true},
   ]},
  {id:'pcp-lps',code:'PCP',org:'Lembaga Penjamin Simpanan',shortOrg:'LPS',
   desc:'Program Calon Pegawai',color:C.blue,bg:'rgba(79,127,255,0.09)',
   diff:3,comp:'1 : 150',slots:'±100 posisi',period:'Mar – Sep',salary:'Rp 12–20 jt/bln',
   enrolled:false,prog:0,
   phases:[
     {id:'cv',name:'CV & Resume',sub:'Highlight experience relevan',icon:'📄',color:C.emerald,lessons:7,xp:400,status:'locked',est:'3 jam'},
     {id:'tpa',name:'TPA & Numerik',sub:'Kemampuan analitik & kuantitatif',icon:'🧠',color:C.blue,lessons:10,xp:700,status:'locked',est:'7 jam'},
     {id:'psiko',name:'Psikotes LPS',sub:'Assessment center + DISC profile',icon:'🔍',color:C.purple,lessons:8,xp:600,status:'locked',est:'5 jam'},
     {id:'interview',name:'Interview Panel',sub:'HR + Subject Matter Expert',icon:'🎤',color:C.cyan,lessons:9,xp:700,status:'locked',est:'5 jam',boss:true},
   ]},
  {id:'pcam-ojk',code:'PCAM',org:'Otoritas Jasa Keuangan',shortOrg:'OJK',
   desc:'Penerimaan Calon Anggota Muda',color:C.purple,bg:'rgba(155,111,255,0.09)',
   diff:5,comp:'1 : 300',slots:'±150 posisi',period:'Feb – Agt',salary:'Rp 14–22 jt/bln',
   enrolled:false,prog:0,
   phases:[
     {id:'cv',name:'CV & Portofolio',sub:'Dokumen & sertifikasi relevan',icon:'📄',color:C.emerald,lessons:9,xp:500,status:'locked',est:'3 jam'},
     {id:'online',name:'Seleksi Online',sub:'TPA lanjutan + TBI + Numerasi',icon:'💻',color:C.blue,lessons:15,xp:1000,status:'locked',est:'10 jam'},

     {id:'medis',name:'Tes Kesehatan',sub:'Persiapan fisik & dokumen medis',icon:'🏥',color:C.red,lessons:4,xp:200,status:'locked',est:'2 jam'},

const LESSONS_TPA=[
  {id:1,name:'Mengenal Format TPA BI',type:'theory',icon:'📚',xp:50,dur:'15 mnt',status:'completed'},
  {id:2,name:'Logika Verbal & Analitis',type:'theory',icon:'📖',xp:50,dur:'20 mnt',status:'completed'},
  {id:3,name:'Latihan Logika Verbal',type:'practice',icon:'✏️',xp:80,dur:'25 mnt',status:'completed'},
  {id:4,name:'Penalaran Numerik',type:'theory',icon:'📐',xp:50,dur:'20 mnt',status:'active'},
  {id:5,name:'Latihan Soal Numerik',type:'practice',icon:'✏️',xp:80,dur:'30 mnt',status:'locked'},
  {id:6,name:'Pola TBI Bank Indonesia',type:'theory',icon:'🌐',xp:60,dur:'25 mnt',status:'locked'},
  {id:7,name:'Reading Comprehension',type:'practice',icon:'📝',xp:80,dur:'30 mnt',status:'locked'},

  {id:11,name:'Mock Test TBI Penuh',type:'mocktest',icon:'🏆',xp:200,dur:'75 mnt',status:'locked',boss:true},

const QUESTIONS=[
  {q:'Buku : Perpustakaan = Lukisan : ?',opts:['Galeri','Seniman','Museum','Kanvas'],correct:0,type:'Analogi Verbal',exp:'Buku disimpan di Perpustakaan. Lukisan dipajang di Galeri — hubungan benda dan tempat penyimpanannya.'},
  {q:'Jika semua bankir adalah ekonom, dan beberapa ekonom adalah peneliti, maka...',opts:['Semua bankir adalah peneliti','Beberapa bankir mungkin peneliti','Tidak ada bankir yang peneliti','Semua peneliti adalah ekonom'],correct:1,type:'Logika Deduktif',exp:'Dari kedua premis, kita hanya dapat menyimpulkan bahwa sebagian bankir kemungkinan juga merupakan peneliti.'},
  {q:'Deret berikut: 2, 6, 18, 54, ... Angka berikutnya adalah?',opts:['108','162','216','324'],correct:1,type:'Penalaran Numerik',exp:'Setiap angka dikali 3: 2×3=6, 6×3=18, 18×3=54, 54×3=162.'},
];

function App(){
  const [tab,setTab]=useState('home');
  const [screen,setScreen]=useState('home');
  const [selPath,setSelPath]=useState(null);
  const [selPhase,setSelPhase]=useState(null);
  const [ls,setLs]=useState({qIdx:0,selected:null,answered:false,correct:0,wrong:0});
  const [xp,setXp]=useState(1240);
  const [streak]=useState(7);
  const [toast,setToast]=useState(null);

  const goTo=useCallback((s,path=null,phase=null)=>{
    setScreen(s);
    if(path)setSelPath(path);
    if(phase)setSelPhase(phase);
    setLs({qIdx:0,selected:null,answered:false,correct:0,wrong:0});
  },[]);

  const goBack=useCallback(()=>{
    if(screen==='lesson')setScreen('phase');
    else if(screen==='phase')setScreen('path');
    else if(screen==='path'){setScreen('home');setTab('home');}
  },[screen]);

  const gainXp=useCallback((amt)=>{
    setToast(`+${amt} XP ⚡`);
    setXp(p=>p+amt);
    setTimeout(()=>setToast(null),2000);
  },[]);

  const handleTab=(id)=>{
    setTab(id);
    if(!['path','phase','lesson'].includes(id))setScreen(id);
  };

  const navItems=[
    {id:'home',Icon:HomeIcon,label:'Beranda'},
    {id:'explore',Icon:CompassIcon,label:'Jelajahi'},
    {id:'stats',Icon:ChartIcon,label:'Progress'},
    {id:'profile',Icon:UserIcon,label:'Profil'},
  ];

  const showNav=!['path','phase','lesson'].includes(screen);

  return(
    <div className="phone">
      {/* Status bar */}
      <div style={{flexShrink:0,padding:'14px 24px 0',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:13,fontWeight:700,color:C.tp,fontFamily:'Syne, sans-serif'}}>9:41</span>
        <div style={{display:'flex',gap:6,alignItems:'center'}}><SigIcon/><WifiIcon/><BatIcon/></div>
      </div>

      {/* Toast */}
      {toast&&(
        <div style={{position:'absolute',top:52,left:'50%',transform:'translateX(-50%)',background:C.gold,color:'#0B0D17',borderRadius:100,padding:'7px 18px',fontWeight:800,fontSize:13,zIndex:999,whiteSpace:'nowrap',fontFamily:'Syne, sans-serif',animation:'popIn 0.3s ease forwards'}}>
          {toast}
        </div>
      )}

      <div className="screen">
        {screen==='home'&&<HomeScreen goTo={goTo} xp={xp} streak={streak} paths={PATHS}/>}
        {screen==='explore'&&<ExploreScreen goTo={goTo} paths={PATHS}/>}
        {screen==='stats'&&<StatsScreen xp={xp} streak={streak}/>}
        {screen==='profile'&&<ProfileScreen xp={xp} streak={streak}/>}
        {screen==='path'&&<PathScreen path={selPath} goBack={goBack} goTo={goTo}/>}
        {screen==='phase'&&<PhaseScreen path={selPath} phase={selPhase} goBack={goBack} goTo={goTo} lessons={LESSONS_TPA}/>}
        {screen==='lesson'&&<LessonScreen path={selPath} phase={selPhase} goBack={goBack} questions={QUESTIONS} gainXp={gainXp} state={ls} setState={setLs}/>}
      </div>

      {showNav&&(
        <div className="bottom-nav">
          <div style={{display:'flex',justifyContent:'space-around'}}>
            {navItems.map(({id,Icon,label})=>{
              const active=tab===id;
              return(
                <button key={id} className="btn" onClick={()=>handleTab(id)}
                  style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'4px 16px',background:'none'}}>
                  <Icon active={active}/>
                  <span style={{fontSize:9.5,color:active?C.gold:C.ts,fontWeight:active?700:400,transition:'color 0.2s',letterSpacing:'0.02em'}}>{label}</span>
                </button>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* ======== HOME ======== */

      {/* Daily Quest */}
      <div className="fade-up-3" style={{marginBottom:18}}>

        <div style={{background:C.card,border:`1px solid ${C.cardB}`,borderRadius:18,padding:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div style={{display:'flex',gap:10,alignItems:'flex-start',flex:1}}>

/* ======== EXPLORE ======== */
function ExploreScreen({goTo,paths}){
  const diffLabel=['','Santai','Menengah','Sulit','Keras','Ekstrem'];
  const diffColor=['',C.emerald,C.blue,C.gold,C.red,C.purple];
  return(
    <div style={{padding:'12px 20px 28px'}}>
      <h1 className="fade-up" style={{fontFamily:'Syne, sans-serif',fontSize:20,fontWeight:800,color:C.tp,marginBottom:5}}>Pilih Jalurmu 🧭</h1>
      <p className="fade-up-2" style={{fontSize:13,color:C.ts,marginBottom:20}}>Rekrutmen bergengsi untuk karir impianmu</p>
      {paths.map((p,i)=>(
        <button key={p.id} className="btn fade-up" onClick={()=>goTo('path',p)}

            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
              <div>

/* ======== LESSON ======== */
function LessonScreen({path,phase,goBack,questions,gainXp,state,setState}){
  const q=questions[Math.min(state.qIdx,questions.length-1)];
  const [timeLeft,setTimeLeft]=useState(45);
  const timerRef=useRef(null);

  useEffect(()=>{
    if(!state.answered){
      setTimeLeft(45);
      timerRef.current=setInterval(()=>{
        setTimeLeft(t=>{
          if(t<=1){clearInterval(timerRef.current);setState(s=>({...s,answered:true,selected:-1,wrong:s.wrong+1}));return 0;}
          return t-1;
        });
      },1000);
    }
    return()=>clearInterval(timerRef.current);
  },[state.qIdx,state.answered]);

  const pick=(idx)=>{
    if(state.answered)return;
    clearInterval(timerRef.current);
    const ok=idx===q.correct;
    setState(s=>({...s,selected:idx,answered:true,correct:s.correct+(ok?1:0),wrong:s.wrong+(ok?0:1)}));
    if(ok)gainXp(50);
  };

  const next=()=>{
    if(state.qIdx<questions.length-1)setState(s=>({...s,qIdx:s.qIdx+1,selected:null,answered:false}));
    else{gainXp(100);goBack();}
  };

  const pct=timeLeft/45;
  const circ=2*Math.PI*11;
  const pc=phase?.color||C.blue;

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',padding:'14px 20px 16px'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14,flexShrink:0}}>
        <button className="btn" onClick={goBack} style={{background:'rgba(255,255,255,0.07)',border:'none',borderRadius:10,width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <BackIcon/>
        </button>
        <div style={{flex:1,background:'rgba(255,255,255,0.055)',borderRadius:100,height:5,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${(state.qIdx/questions.length)*100}%`,background:`linear-gradient(90deg,${pc},${C.cyan})`,borderRadius:100,transition:'width 0.5s ease'}}/>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:7,flexShrink:0}}>
          <span style={{fontSize:11,color:state.correct>0?C.emerald:C.ts}}>✅ {state.correct}</span>
          <span style={{fontSize:11,color:state.wrong>0?C.red:C.ts}}>❌ {state.wrong}</span>
        </div>
      </div>

      {/* Type + Timer row */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexShrink:0}}>
        <span style={{fontSize:11,background:C.blueBg,color:C.blue,borderRadius:7,padding:'4px 10px',fontWeight:700}}>{q.type}</span>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <svg width="30" height="30" viewBox="0 0 30 30">
            <circle cx="15" cy="15" r="11" fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="3"/>
            <circle cx="15" cy="15" r="11" fill="none"
              stroke={timeLeft<=10?C.red:C.gold} strokeWidth="3"
              strokeDasharray={`${circ*pct} ${circ}`}
              strokeLinecap="round"
              style={{transform:'rotate(-90deg)',transformOrigin:'center',transition:'stroke-dasharray 1s linear'}}/>
          </svg>
          <span style={{fontFamily:'Syne, sans-serif',fontSize:14,fontWeight:800,color:timeLeft<=10?C.red:C.tp,minWidth:24}}>{timeLeft}s</span>
        </div>
      </div>

      {/* Question card */}
      <div style={{background:C.card,border:`1px solid ${C.cardB}`,borderRadius:20,padding:18,marginBottom:16,flexShrink:0}}>
        <p style={{fontSize:10,color:C.ts,marginBottom:8,fontWeight:700,letterSpacing:'0.04em'}}>SOAL {state.qIdx+1} DARI {questions.length}</p>
        <p style={{fontSize:15,color:C.tp,lineHeight:1.65,fontWeight:500}}>{q.q}</p>
      </div>

      {/* Options */}
      <div style={{flex:1,display:'flex',flexDirection:'column',gap:9,overflow:'auto'}}>
        {q.opts.map((opt,i)=>{
          let bg=C.card,bdr=C.cardB,col=C.tp;
          if(state.answered){
            if(i===q.correct){bg=C.emeraldBg;bdr=C.emerald+'40';col=C.emerald;}
            else if(i===state.selected&&i!==q.correct){bg=C.redBg;bdr=C.red+'40';col=C.red;}
            else{bg='rgba(255,255,255,0.018)';}
          }
          return(
            <button key={i} className="btn" onClick={()=>pick(i)}
              style={{background:bg,border:`1px solid ${bdr}`,borderRadius:14,padding:'12px 14px',textAlign:'left',display:'flex',gap:10,alignItems:'center',transition:'all 0.22s ease'}}>
              <span style={{width:24,height:24,borderRadius:'50%',background:'rgba(255,255,255,0.055)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:col,flexShrink:0}}>
                {['A','B','C','D'][i]}
              </span>
              <span style={{fontSize:13,color:col,fontWeight:500,lineHeight:1.4}}>{opt}</span>
              {state.answered&&i===q.correct&&<span style={{marginLeft:'auto',fontSize:14}}>✓</span>}
            </button>
          );
        })}
      </div>

      {/* Explanation + Next */}
      {state.answered&&(
        <div style={{marginTop:12,flexShrink:0}}>
          <div style={{background:state.selected===q.correct?C.emeraldBg:C.redBg,border:`1px solid ${state.selected===q.correct?C.emerald+'35':C.red+'35'}`,borderRadius:14,padding:12,marginBottom:10,animation:'fadeUp 0.3s ease forwards'}}>
            <p style={{fontSize:12,fontWeight:800,color:state.selected===q.correct?C.emerald:C.red,marginBottom:4}}>
              {state.selected===q.correct?'✅ Benar! +50 XP':'❌ Belum tepat'}
            </p>
            <p style={{fontSize:11,color:C.ts,lineHeight:1.55}}>{q.exp}</p>
          </div>
          <button className="btn" onClick={next}
            style={{width:'100%',background:`linear-gradient(135deg,${pc},${pc}BB)`,border:'none',borderRadius:14,padding:14,fontFamily:'Syne, sans-serif',fontSize:13,fontWeight:800,color:'#fff'}}>
            {state.qIdx<questions.length-1?'Soal Berikutnya →':'Selesai! Klaim Hadiahmu 🏆'}
          </button>
        </div>
      )}
    </div>
  );
}

        <p style={{fontFamily:'Syne, sans-serif',fontSize:17,fontWeight:800,color:C.tp}}>Rizky Pratama</p>
        <p style={{fontSize:12,color:C.ts,marginBottom:10}}>rizky.pratama@email.com</p>
        <div style={{display:'inline-flex',gap:6,alignItems:'center',background:C.goldBg,border:`1px solid ${C.gold}25`,borderRadius:100,padding:'6px 14px'}}>
          <span style={{fontSize:13}}>🔥</span>
          <span style={{fontFamily:'Syne, sans-serif',fontSize:12,fontWeight:800,color:C.gold}}>{streak} hari berturut-turut</span>
        </div>
      </div>
      <div className="fade-up-3">
        {items.map((item,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:13,background:C.card,border:`1px solid ${C.cardB}`,borderRadius:13,marginBottom:7}}>
            <span style={{fontSize:17,width:30,textAlign:'center'}}>{item.i}</span>
            <div style={{flex:1}}>
              <p style={{fontSize:12,fontWeight:600,color:C.tp}}>{item.l}</p>
              {item.s&&<p style={{fontSize:10,color:C.ts}}>{item.s}</p>}
            </div>
            <span style={{color:C.ts,fontSize:16}}>›</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ======== SMALL COMPONENTS ======== */
function Chip({icon,value,color}){
  return(
    <div style={{background:C.card,border:`1px solid ${C.cardB}`,borderRadius:11,padding:'5px 10px',display:'flex',alignItems:'center',gap:5}}>
      <span style={{fontSize:13}}>{icon}</span>
      <span style={{fontFamily:'Syne, sans-serif',fontSize:12,fontWeight:800,color}}>{value}</span>
    </div>
  );
}

function SectionLabel({children,noBottom}){
  return(
    <p style={{fontSize:11,color:C.ts,textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:700,marginBottom:noBottom?0:10}}>{children}</p>
  );
}

function ProgressBar({value,color,shimmer}){
  return(
    <div style={{background:'rgba(255,255,255,0.055)',borderRadius:100,height:5,overflow:'hidden'}}>
      <div style={{height:'100%',width:`${value*100}%`,background:color,borderRadius:100,position:'relative',overflow:'hidden',transition:'width 0.6s ease'}}>
        {shimmer&&<div style={{position:'absolute',inset:0,background:'linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent)',animation:'shimmer 2s ease-in-out infinite'}}/>}
      </div>
    </div>
  );
}

function StatCard({label,value,sub,subColor}){
  return(
    <div style={{background:C.card,border:`1px solid ${C.cardB}`,borderRadius:16,padding:14}}>
      <p style={{fontSize:10,color:C.ts,marginBottom:3,letterSpacing:'0.03em'}}>{label}</p>
      <p style={{fontFamily:'Syne, sans-serif',fontSize:22,fontWeight:800,color:C.tp,marginBottom:3}}>{value}</p>
      <p style={{fontSize:10,color:subColor}}>{sub}</p>
    </div>
  );
}
